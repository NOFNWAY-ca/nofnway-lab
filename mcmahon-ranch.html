<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McMahon Ranch — Ranch Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2c1a0e;--accent:#a0522d;--bg:#f7f3ee;--border:#d8cfc4;
  --muted:#6b5c4e;--success:#3a6b2a;--warning:#9c6b00;--danger:#b02020;
  --success-bg:#e8f5e4;--warning-bg:#fdf6e3;--danger-bg:#fdf0f0;
}
body{font-family:'Source Sans 3',sans-serif;font-size:14px;background:var(--bg);color:var(--primary);min-height:100vh}

/* Header */
header{background:var(--primary);padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left h1{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;color:#fff;letter-spacing:1px}
.hdr-sub{font-size:11px;color:#c8b89a;text-transform:uppercase;letter-spacing:2px;margin-top:2px;display:block}
.settings-btn{background:none;border:1px solid rgba(200,184,154,.3);color:#c8b89a;font-size:17px;width:34px;height:34px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.settings-btn:hover{border-color:#c8b89a;color:#fff}

/* Tabs */
.tab-nav{background:var(--primary);display:flex;padding:0 20px;border-bottom:3px solid var(--accent)}
.tab-btn{font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#a08060;background:none;border:none;padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:#c8b89a}
.tab-btn.active{color:#fff;border-bottom-color:#f7f3ee}

/* Content */
#content{padding:20px 24px 48px;max-width:1600px}

/* Sections */
.section{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.sec-hdr-right{display:flex;gap:10px;align-items:center}

/* Buttons */
.btn{font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;transition:opacity .15s,background .15s;white-space:nowrap}
.btn:hover{opacity:.87}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--primary)}
.btn-outline:hover{border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{font-size:12px;padding:5px 11px}
.btn-xs{font-size:11px;padding:3px 8px}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.search-inp{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 11px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary);min-width:200px}
.search-inp:focus{outline:none;border-color:var(--accent)}
.filter-sel{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary)}
.filter-sel:focus{outline:none;border-color:var(--accent)}

/* Tables */
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--primary);color:#c8b89a;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#fff}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
thead th.no-sort{cursor:default}
tbody tr{border-bottom:1px solid #ece6df}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf7f4}
tbody td{padding:9px 12px;vertical-align:middle}
.td-muted{color:var(--muted)}
.td-act{text-align:right;white-space:nowrap}
.td-act .btn{margin-left:4px}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.b-purebred{background:var(--primary);color:#f9a825}
.b-for-sale{background:var(--success);color:#fff}
.b-sold{background:#d8cfc4;color:var(--muted)}
.b-deceased,.b-culled{background:var(--muted);color:#fff}
.b-active{background:var(--success-bg);color:var(--success)}
.b-ongoing{background:var(--danger-bg);color:var(--danger)}
.b-monitoring{background:var(--warning-bg);color:var(--warning)}
.b-resolved{background:var(--success-bg);color:var(--success)}
.b-good{background:var(--success-bg);color:var(--success)}
.b-due-soon{background:var(--warning-bg);color:var(--warning)}
.b-repair-needed{background:var(--danger-bg);color:var(--danger)}
.b-out-of-service{background:var(--danger);color:#fff}
.b-overdue{background:var(--danger-bg);color:var(--danger)}
.b-wd{background:var(--danger-bg);color:var(--danger);font-size:9px}

/* Alerts */
.alert{padding:10px 14px;border-radius:5px;margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert-warn{background:var(--warning-bg);border-left:3px solid var(--warning);color:#5a3d00}
.alert-danger{background:var(--danger-bg);border-left:3px solid var(--danger);color:#6e1010}

/* Feed inventory */
.feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:4px}
.feed-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px}
.feed-card.low{border-color:var(--warning)}
.feed-card-name{font-weight:600;font-size:15px}
.feed-card.low .feed-card-name{color:var(--warning)}
.feed-card-qty{font-size:13px;color:var(--muted);margin-top:4px}
.feed-card-hdr{display:flex;justify-content:space-between;align-items:flex-start}
.prog-wrap{background:#ece6df;border-radius:4px;height:7px;margin:8px 0 4px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;transition:width .3s}
.prog-ok{background:var(--success)}
.prog-warn{background:var(--warning)}
.prog-label{font-size:11px;color:var(--muted)}

/* Location grid */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.loc-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px}
.loc-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:3px}
.loc-meta{font-size:12px;color:var(--muted);margin-bottom:6px}
.loc-count{font-size:26px;font-weight:700;line-height:1}
.loc-count-lbl{font-size:11px;color:var(--muted)}
.loc-count-link{color:var(--primary);text-decoration:none;cursor:pointer}
.loc-count-link:hover{color:var(--accent);text-decoration:underline}
.loc-actions{display:flex;gap:6px;margin-top:10px}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1000px){.two-col{grid-template-columns:1fr}}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(44,26,14,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-ov.hidden{display:none}
.modal-box{background:#fff;border-radius:8px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(44,26,14,.22)}
.modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--primary)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Forms */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg.c1{grid-template-columns:1fr}
.frow{display:flex;flex-direction:column;gap:4px}
.frow.s2{grid-column:span 2}
.flabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.finput,.fselect,.ftextarea{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary);width:100%}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:var(--accent)}
.ftextarea{resize:vertical;min-height:70px}
.fhint{font-size:11px;color:var(--muted)}

/* Settings list */
.slist{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px}
.slist-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #ece6df;font-size:13px}
.slist-item:last-child{border-bottom:none}
.sadd-row{display:flex;gap:8px;margin-top:6px}

/* Misc */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.count-note{font-size:12px;color:var(--muted);margin-left:auto}
.toggle-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit}
.sub-divider{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>
</head>

// ── STORAGE ────────────────────────────────────────────
function loadData() {
  if (!localStorage.getItem(K.cattle)) {
    D = seed(); saveAll(); return;
  }
  for (const k in K) {
    const raw = localStorage.getItem(K[k]);
    D[k] = raw ? JSON.parse(raw) : (seed()[k] || (k==='settings'?{}:[]));
  }
}
function save(k){ localStorage.setItem(K[k], JSON.stringify(D[k])); }
function saveAll(){ for(const k in K) save(k); }

// ── UTILITIES ──────────────────────────────────────────
function genId(){ return '_'+Math.random().toString(36).substr(2,9); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(iso){
  if(!iso) return '—';
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y,m,d]=iso.split('-').map(Number);
  return `${mn[m-1]} ${d}, ${y}`;
}
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
}
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function feedName(id){ const f=D.feedInv.find(x=>x.id===id); return f?f.name:'—'; }
function feedUnit(id){ const f=D.feedInv.find(x=>x.id===id); return f?f.unit:''; }
function equipName(id){ const e=D.equip.find(x=>x.id===id); return e?e.name:'—'; }
function headCount(loc){
  return D.cattle.filter(c=>c.location===loc&&(c.status==='Active'||c.status==='For Sale')).length;
}
function calcNext(last,interval){
  if(!last||interval==='As needed') return '';
  const d=new Date(last+'T00:00:00');
  if(interval==='Monthly') d.setMonth(d.getMonth()+1);
  else if(interval==='Quarterly') d.setMonth(d.getMonth()+3);
  else if(interval==='Semi-annual') d.setMonth(d.getMonth()+6);
  else if(interval==='Annual') d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
function sortArr(arr,col,dir){
  return [...arr].sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(va==null) va=''; if(vb==null) vb='';
    if(typeof va==='number'&&typeof vb==='number') return dir==='asc'?va-vb:vb-va;
    va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
    return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });
}
function getSort(tid){ return sortStates[tid]||{col:null,dir:'asc'}; }
function toggleSort(tid,col){
  const s=getSort(tid);
  sortStates[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc'};
  render();
}
function thCls(tid,col){
  const s=getSort(tid);
  return s.col===col?(s.dir==='asc'?'sort-asc':'sort-desc'):'';
}

}

  else if(currentTab==='feed') el.innerHTML=renderFeed();
  else if(currentTab==='health') el.innerHTML=renderHealth();
  else if(currentTab==='equipment') el.innerHTML=renderEquipment();
  else if(currentTab==='pastures') el.innerHTML=renderPastures();
}

function saveFeedLog(id){
  const qty=parseFloat(document.getElementById('f-qty').value)||0;
  const feedId=document.getElementById('f-feedid').value;
  const data={date:document.getElementById('f-date').value,feedId,qty,
    location:document.getElementById('f-loc').value,
    notes:document.getElementById('f-notes').value.trim()};
  if(id){
    const old=D.feedLog.find(x=>x.id===id);
    if(old){const fi=D.feedInv.find(x=>x.id===old.feedId);if(fi)fi.onHand+=old.qty;}
    const ni=D.feedInv.find(x=>x.id===feedId);if(ni)ni.onHand=Math.max(0,ni.onHand-qty);
    const i=D.feedLog.findIndex(x=>x.id===id);D.feedLog[i]={id,...data};
  }else{
    const fi=D.feedInv.find(x=>x.id===feedId);if(fi)fi.onHand=Math.max(0,fi.onHand-qty);
    D.feedLog.push({id:genId(),...data});
  }
  save('feedLog');save('feedInv');closeModal();render();
}

    alerts+=`<div class="alert alert-danger">&#9888; <span><strong>Withdrawal active:</strong> ${esc(h.tag)} — ${esc(h.condition)} — expires ${fmtDate(h.withdrawal)}</span></div>`;
  });
  D.vacc.filter(v=>!v.completed&&v.scheduled>=td&&v.scheduled<=in14s).forEach(v=>{
    const days=daysBetween(td,v.scheduled);
    const lbl=days===0?'today':days===1?'tomorrow':`in ${days} days`;
    alerts+=`<div class="alert alert-warn">&#128197; <span><strong>Vaccination due ${lbl}:</strong> ${esc(v.vaccine)} — ${esc(v.group)} (${fmtDate(v.scheduled)})</span></div>`;
  });

  const show=ui.healthHistory;
  const hlist=D.health.filter(h=>show?true:h.status!=='Resolved');
  const ss=getSort('health');
  const sorted=ss.col?sortArr(hlist,ss.col,ss.dir):hlist;
  const hrows=sorted.map(h=>{
    const bcls={'Ongoing':'b-ongoing','Monitoring':'b-monitoring','Resolved':'b-resolved'}[h.status]||'b-ongoing';
    const wd=h.withdrawal&&h.withdrawal>=td?`<span class="badge b-wd" style="margin-left:4px">WD to ${fmtDate(h.withdrawal)}</span>`:'';
    return `<tr>
      <td><strong>${esc(h.tag)}</strong></td>
      <td>${esc(h.condition)}</td>
      <td>${esc(h.treatment)}</td>
      <td>${fmtDate(h.startDate)}</td>
      <td>${h.endDate?fmtDate(h.endDate):'<span class="td-muted">Ongoing</span>'}</td>
      <td><span class="badge ${bcls}">${esc(h.status)}</span>${wd}</td>
      <td class="td-muted">${esc(h.vet)}</td>
      <td class="td-act">
        <button class="btn btn-outline btn-xs" onclick="editHealth('${h.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="delHealth('${h.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  const vlist=[...D.vacc].sort((a,b)=>{
    if(a.completed!==b.completed) return a.completed?1:-1;
    return a.scheduled.localeCompare(b.scheduled);
  });
  const vrows=vlist.map(v=>{
    const past=v.scheduled<td&&!v.completed;
    const soon=!v.completed&&v.scheduled>=td&&v.scheduled<=in14s;
    const dateCell=`${fmtDate(v.scheduled)}${past?' <span class="badge b-overdue">Overdue</span>':soon?' <span class="badge b-due-soon">Due Soon</span>':''}`;
    const doneCell=v.completed
      ?`<span style="color:var(--success)">&#10003; ${fmtDate(v.completedDate)}</span>`
      :`<button class="btn btn-outline btn-xs" onclick="markVaccDone('${v.id}')">Mark Done</button>`;
    return `<tr>
      <td>${esc(v.vaccine)}</td>
      <td>${esc(v.group)}</td>
      <td>${dateCell}</td>
      <td>${doneCell}</td>
      <td class="td-act">
        <button class="btn btn-outline btn-xs" onclick="editVacc('${v.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="delVacc('${v.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  return `${alerts?`<div class="section">${alerts}</div>`:''}
  <div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Health Records</span>
      <div class="sec-hdr-right">
        <button class="toggle-link" onclick="ui.healthHistory=!ui.healthHistory;render()">${show?'Show Active Only':'Show Full History'}</button>
        <button class="btn btn-primary" onclick="addHealth()">+ Add Record</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('health','tag')" class="${thCls('health','tag')}">Tag</th>
        <th onclick="toggleSort('health','condition')" class="${thCls('health','condition')}">Condition</th>
        <th>Treatment</th>
        <th onclick="toggleSort('health','startDate')" class="${thCls('health','startDate')}">Start</th>
        <th>End</th><th>Status</th><th>Vet / Treater</th><th class="no-sort"></th>
      </tr></thead>
      <tbody>${hrows||'<tr><td colspan="8" class="empty">No records match.</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Vaccination Schedule</span>
      <button class="btn btn-primary" onclick="addVacc()">+ Add Vaccination</button>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('vacc','vaccine')" class="${thCls('vacc','vaccine')}">Vaccine</th>
        <th>Target Group</th>
        <th onclick="toggleSort('vacc','scheduled')" class="${thCls('vacc','scheduled')}">Scheduled</th>
        <th>Completed</th><th class="no-sort"></th>
      </tr></thead>
      <tbody>${vrows||'<tr><td colspan="5" class="empty">No vaccinations scheduled.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

  const recent=[...D.moves].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,20);
  const mrows=recent.map(m=>`<tr>
    <td>${fmtDate(m.date)}</td>
    <td><strong>${esc(m.animals)}</strong></td>
    <td>${esc(m.from)||'<span class="td-muted">—</span>'}</td>
    <td>${esc(m.to)}</td>
    <td class="td-muted">${esc(m.reason)||'—'}</td>
    <td class="td-act">
      <button class="btn btn-danger btn-xs" onclick="delMove('${m.id}')">Delete</button>
    </td>
  </tr>`).join('');

  return `<div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Pastures &amp; Pens</span>
      <div class="sec-hdr-right">
        <button class="btn btn-outline" onclick="addLoc()">+ Add Location</button>
        <button class="btn btn-primary" onclick="logMove()">Log a Move</button>
      </div>
    </div>
    <div class="loc-grid">${cards||'<div class="empty">No locations added.</div>'}</div>
  </div>
  <div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Recent Moves</span>
      <span class="count-note">Last 20</span>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('moves','date')" class="${thCls('moves','date')}">Date</th>
        <th>Animal(s)</th><th>From</th><th>To</th><th>Reason</th><th class="no-sort"></th>
      </tr></thead>
      <tbody>${mrows||'<tr><td colspan="6" class="empty">No moves logged.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function goToCattleByLoc(locName){
  ui.cattleLoc=locName;ui.cattleQ='';ui.cattleType='';ui.cattleBreed='';
  switchTab('cattle');
}

function addLoc(){ openLocModal(null); }
function editLoc(id){ openLocModal(D.locs.find(x=>x.id===id)); }

function openLocModal(l){
  const isEdit=!!l;
  setModal(isEdit?`Edit — ${l.name}`:'Add Location',`<div class="fg">
    <div class="frow s2"><label class="flabel">Name *</label>
      <input class="finput" id="f-name" type="text" value="${esc(l?.name||'')}" placeholder="e.g. North Pasture"></div>
    <div class="frow"><label class="flabel">Type</label>
      <select class="fselect" id="f-type">${['Pasture','Pen','Barn','Drylot','Other'].map(t=>`<option${l?.type===t?' selected':''}>${t}</option>`).join('')}</select></div>
    <div class="frow"><label class="flabel">Size (optional)</label>
      <input class="finput" id="f-size" type="text" value="${esc(l?.size||'')}" placeholder="e.g. 88 acres or Indoor"></div>
    <div class="frow s2"><label class="flabel">Notes</label>
      <textarea class="ftextarea" id="f-notes">${esc(l?.notes||'')}</textarea></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveLoc('${isEdit?l.id:''}')">Save</button>
  </div>`);
}

function saveLoc(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Location name is required.');return;}
  const data={name,type:document.getElementById('f-type').value,
    size:document.getElementById('f-size').value.trim(),
    notes:document.getElementById('f-notes').value.trim()};
  if(id){
    const i=D.locs.findIndex(x=>x.id===id);
    const oldName=D.locs[i].name;
    D.locs[i]={...D.locs[i],...data};
    if(oldName!==name){
      D.cattle.forEach(c=>{if(c.location===oldName)c.location=name;});
      save('cattle');
    }
  }else D.locs.push({id:genId(),...data});
  save('locs');closeModal();render();
}

function delLoc(id){
  const l=D.locs.find(x=>x.id===id);
  if(!confirm(`Delete "${l.name}"? Animals assigned here will not be automatically reassigned.`))return;
  D.locs=D.locs.filter(x=>x.id!==id);save('locs');render();
}

function logMove(){
  const locOpts=D.locs.map(l=>`<option value="${esc(l.name)}">${esc(l.name)}</option>`).join('');
  setModal('Log a Move',`<div class="fg c1">
    <div class="frow"><label class="flabel">Date</label>
      <input class="finput" id="f-date" type="date" value="${today()}"></div>
    <div class="frow"><label class="flabel">Animal Tag(s) *</label>
      <input class="finput" id="f-animals" type="text" placeholder="e.g. M-001 or M-001, M-002, M-003">
      <span class="fhint">Comma-separated for multiple animals. Location in the Cattle roster will be updated automatically.</span></div>
    <div class="frow"><label class="flabel">From Location</label>
      <select class="fselect" id="f-from"><option value="">— Select —</option>${locOpts}</select></div>
    <div class="frow"><label class="flabel">To Location *</label>
      <select class="fselect" id="f-to"><option value="">— Select —</option>${locOpts}</select></div>
    <div class="frow"><label class="flabel">Reason (optional)</label>
      <input class="finput" id="f-reason" type="text" placeholder="e.g. Breeding season start"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveMove()">Log Move</button>
  </div>`);
}

function saveMove(){
  const animals=document.getElementById('f-animals').value.trim();
  const to=document.getElementById('f-to').value;
  if(!animals){alert('Animal tag(s) are required.');return;}
  if(!to){alert('Destination location is required.');return;}
  const tags=animals.split(',').map(t=>t.trim()).filter(Boolean);
  let found=0;
  tags.forEach(tag=>{
    const c=D.cattle.find(x=>x.tag.toLowerCase()===tag.toLowerCase());
    if(c){c.location=to;found++;}
  });
  if(found>0) save('cattle');
  D.moves.push({id:genId(),date:document.getElementById('f-date').value,animals,
    from:document.getElementById('f-from').value,to,
    reason:document.getElementById('f-reason').value.trim()});
  save('moves');closeModal();render();
  if(found<tags.length){
    setTimeout(()=>alert(`Move logged. Note: ${tags.length-found} tag(s) not found in the cattle roster and were not updated automatically.`),100);
  }
}

function delMove(id){
  if(!confirm('Delete this move entry?'))return;
  D.moves=D.moves.filter(x=>x.id!==id);save('moves');render();
}

// ═══════════════════════════════════════════════════════
// SETTINGS
// ═══════════════════════════════════════════════════════
function openSettings(){
  setModal('Settings','');
  renderSettingsBody();
}

function renderSettingsBody(){
  const vets=D.settings.vets||[];
  const vitems=vets.map((v,i)=>`<div class="slist-item">
    <span>${esc(v)}</span>
    <button class="btn btn-danger btn-xs" onclick="rmVet(${i})">Remove</button>
  </div>`).join('');

  document.getElementById('modal-body').innerHTML=`
    <div style="margin-bottom:22px">
      <div class="sub-divider">Ranch Name</div>
      <div style="display:flex;gap:10px;align-items:center">
        <input class="finput" id="f-rname" type="text" value="${esc(D.settings.ranchName||'McMahon Ranch')}" style="max-width:260px">
        <button class="btn btn-primary btn-sm" onclick="saveRanchName()">Save</button>
      </div>
    </div>
    <div style="margin-bottom:22px">
      <div class="sub-divider">Vets / Treaters</div>
      <div class="slist">${vitems||'<div class="slist-item td-muted">None added.</div>'}</div>
      <div class="sadd-row">
        <input class="finput" id="f-newvet" type="text" placeholder="Name or description" style="flex:1">
        <button class="btn btn-primary btn-sm" onclick="addVet()">Add</button>
      </div>
    </div>
    <div>
      <div class="sub-divider">Feed Types</div>
      <p class="fhint" style="margin-bottom:10px">Feed types are managed in the Feed tab under the inventory section.</p>
      <button class="btn btn-outline btn-sm" onclick="closeModal();switchTab('feed')">Go to Feed Tab →</button>
    </div>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="closeModal()">Close</button>
    </div>`;
}

function saveRanchName(){
  const n=document.getElementById('f-rname').value.trim();
  if(!n)return;
  D.settings.ranchName=n;save('settings');
  document.getElementById('hdr-name').textContent=n.toUpperCase();
}

function addVet(){
  const v=document.getElementById('f-newvet').value.trim();
  if(!v)return;
  if(!D.settings.vets)D.settings.vets=[];
  D.settings.vets.push(v);save('settings');renderSettingsBody();
}

function rmVet(i){
  D.settings.vets.splice(i,1);save('settings');renderSettingsBody();
}

// ═══════════════════════════════════════════════════════
// MODAL
// ═══════════════════════════════════════════════════════
function setModal(title,body){
  document.getElementById('modal-title').textContent=title;
  document.getElementById('modal-body').innerHTML=body;
  openModal();
}

function openModal(){
  document.getElementById('modal-ov').classList.remove('hidden');
}

function closeModal(){
  document.getElementById('modal-ov').classList.add('hidden');
}

document.getElementById('modal-ov').addEventListener('click',function(e){
  if(e.target===this)closeModal();
});

document.addEventListener('keydown',function(e){
  if(e.key==='Escape')closeModal();
});

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
function init(){
  loadData();
  document.getElementById('hdr-name').textContent=(D.settings?.ranchName||'McMahon Ranch').toUpperCase();
  render();
}

init();
</script>
</body>
</html>
