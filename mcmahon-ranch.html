<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>McMahon Ranch — Ranch Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#2c1a0e;--accent:#a0522d;--bg:#f7f3ee;--border:#d8cfc4;
  --muted:#6b5c4e;--success:#3a6b2a;--warning:#9c6b00;--danger:#b02020;
  --success-bg:#e8f5e4;--warning-bg:#fdf6e3;--danger-bg:#fdf0f0;
}
body{font-family:'Source Sans 3',sans-serif;font-size:14px;background:var(--bg);color:var(--primary);min-height:100vh}

/* Header */
header{background:var(--primary);padding:13px 24px;display:flex;align-items:center;justify-content:space-between}
.hdr-left h1{font-family:'Playfair Display',serif;font-weight:700;font-size:26px;color:#fff;letter-spacing:1px}
.hdr-sub{font-size:11px;color:#c8b89a;text-transform:uppercase;letter-spacing:2px;margin-top:2px;display:block}
.settings-btn{background:none;border:1px solid rgba(200,184,154,.3);color:#c8b89a;font-size:17px;width:34px;height:34px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.settings-btn:hover{border-color:#c8b89a;color:#fff}

/* Tabs */
.tab-nav{background:var(--primary);display:flex;padding:0 20px;border-bottom:3px solid var(--accent)}
.tab-btn{font-family:'Source Sans 3',sans-serif;font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.8px;color:#a08060;background:none;border:none;padding:10px 16px;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-3px;transition:color .15s,border-color .15s;white-space:nowrap}
.tab-btn:hover{color:#c8b89a}
.tab-btn.active{color:#fff;border-bottom-color:#f7f3ee}

/* Content */
#content{padding:20px 24px 48px;max-width:1600px}

/* Sections */
.section{margin-bottom:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.sec-title{font-family:'Playfair Display',serif;font-size:18px;font-weight:700}
.sec-hdr-right{display:flex;gap:10px;align-items:center}

/* Buttons */
.btn{font-family:'Source Sans 3',sans-serif;font-size:13px;font-weight:600;padding:7px 14px;border-radius:4px;border:none;cursor:pointer;transition:opacity .15s,background .15s;white-space:nowrap}
.btn:hover{opacity:.87}
.btn-primary{background:var(--primary);color:#fff}
.btn-accent{background:var(--accent);color:#fff}
.btn-outline{background:none;border:1px solid var(--border);color:var(--primary)}
.btn-outline:hover{border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff}
.btn-sm{font-size:12px;padding:5px 11px}
.btn-xs{font-size:11px;padding:3px 8px}

/* Toolbar */
.toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
.search-inp{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 11px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary);min-width:200px}
.search-inp:focus{outline:none;border-color:var(--accent)}
.filter-sel{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:7px 9px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary)}
.filter-sel:focus{outline:none;border-color:var(--accent)}

/* Tables */
.tbl-wrap{background:#fff;border:1px solid var(--border);border-radius:6px;overflow:hidden}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:var(--primary);color:#c8b89a;font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.6px;padding:9px 12px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap}
thead th:hover{color:#fff}
thead th.sort-asc::after{content:' ↑'}
thead th.sort-desc::after{content:' ↓'}
thead th.no-sort{cursor:default}
tbody tr{border-bottom:1px solid #ece6df}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:#faf7f4}
tbody td{padding:9px 12px;vertical-align:middle}
.td-muted{color:var(--muted)}
.td-act{text-align:right;white-space:nowrap}
.td-act .btn{margin-left:4px}
.td-check{width:34px;text-align:center}
.tag-strong{font-size:14px;font-weight:800}
.status-stack{display:flex;align-items:center;gap:5px;flex-wrap:wrap}

/* Badges */
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;text-transform:uppercase;letter-spacing:.4px}
.b-purebred{background:var(--primary);color:#f9a825}
.b-for-sale{background:var(--success);color:#fff}
.b-sold{background:#d8cfc4;color:var(--muted)}
.b-deceased,.b-culled{background:var(--muted);color:#fff}
.b-active{background:var(--success-bg);color:var(--success)}
.b-ongoing{background:var(--danger-bg);color:var(--danger)}
.b-monitoring{background:var(--warning-bg);color:var(--warning)}
.b-resolved{background:var(--success-bg);color:var(--success)}
.b-good{background:var(--success-bg);color:var(--success)}
.b-due-soon{background:var(--warning-bg);color:var(--warning)}
.b-repair-needed{background:var(--danger-bg);color:var(--danger)}
.b-out-of-service{background:var(--danger);color:#fff}
.b-overdue{background:var(--danger-bg);color:var(--danger)}
.b-wd{background:var(--danger-bg);color:var(--danger);font-size:9px}
.b-flagged{background:#ece6df;color:var(--muted)}

/* Alerts */
.alert{padding:10px 14px;border-radius:5px;margin-bottom:8px;font-size:13px;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.alert-warn{background:var(--warning-bg);border-left:3px solid var(--warning);color:#5a3d00}
.alert-danger{background:var(--danger-bg);border-left:3px solid var(--danger);color:#6e1010}
.today-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:14px}
.alert-section{background:#fff;border:1px solid var(--border);border-radius:6px;padding:12px}
.alert-section summary{font-family:'Playfair Display',serif;font-weight:700;font-size:16px;cursor:pointer;list-style:none;display:flex;justify-content:space-between;gap:8px}
.alert-section summary::-webkit-details-marker{display:none}
.alert-list{margin-top:10px}
.timeline{border-left:2px solid var(--border);margin-top:10px;padding-left:14px}
.timeline-item{position:relative;margin-bottom:12px;font-size:13px;line-height:1.45}
.timeline-item::before{content:'';position:absolute;left:-20px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--accent)}
.timeline-date{font-weight:700;color:var(--muted);font-size:12px}

/* Feed inventory */
.feed-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:14px;margin-bottom:4px}
.feed-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px}
.feed-card.low{border-color:var(--warning)}
.feed-card-name{font-weight:600;font-size:15px}
.feed-card.low .feed-card-name{color:var(--warning)}
.feed-card-qty{font-size:13px;color:var(--muted);margin-top:4px}
.feed-card-hdr{display:flex;justify-content:space-between;align-items:flex-start}
.prog-wrap{background:#ece6df;border-radius:4px;height:7px;margin:8px 0 4px;overflow:hidden}
.prog-bar{height:100%;border-radius:4px;transition:width .3s}
.prog-ok{background:var(--success)}
.prog-warn{background:var(--warning)}
.prog-label{font-size:11px;color:var(--muted)}

/* Location grid */
.loc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:12px}
.loc-card{background:#fff;border:1px solid var(--border);border-radius:6px;padding:14px}
.loc-name{font-family:'Playfair Display',serif;font-size:15px;font-weight:700;margin-bottom:3px}
.loc-meta{font-size:12px;color:var(--muted);margin-bottom:6px}
.loc-count{font-size:26px;font-weight:700;line-height:1}
.loc-count-lbl{font-size:11px;color:var(--muted)}
.loc-count-link{color:var(--primary);text-decoration:none;cursor:pointer}
.loc-count-link:hover{color:var(--accent);text-decoration:underline}
.loc-actions{display:flex;gap:6px;margin-top:10px}

/* Two-col layout */
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:1000px){.two-col{grid-template-columns:1fr}}

/* Modal */
.modal-ov{position:fixed;inset:0;background:rgba(44,26,14,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal-ov.hidden{display:none}
.modal-box{background:#fff;border-radius:8px;width:100%;max-width:600px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 8px 32px rgba(44,26,14,.22)}
.modal-hdr{padding:16px 20px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-family:'Playfair Display',serif;font-size:19px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--primary)}
.modal-body{padding:20px;overflow-y:auto;flex:1}
.modal-foot{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border)}

/* Forms */
.fg{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.fg.c1{grid-template-columns:1fr}
.frow{display:flex;flex-direction:column;gap:4px}
.frow.s2{grid-column:span 2}
.flabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
.finput,.fselect,.ftextarea{font-family:'Source Sans 3',sans-serif;font-size:13px;padding:8px 10px;border:1px solid var(--border);border-radius:4px;background:#fff;color:var(--primary);width:100%}
.finput:focus,.fselect:focus,.ftextarea:focus{outline:none;border-color:var(--accent)}
.ftextarea{resize:vertical;min-height:70px}
.fhint{font-size:11px;color:var(--muted)}

/* Settings list */
.slist{border:1px solid var(--border);border-radius:4px;overflow:hidden;margin-bottom:8px}
.slist-item{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid #ece6df;font-size:13px}
.slist-item:last-child{border-bottom:none}
.sadd-row{display:flex;gap:8px;margin-top:6px}

/* Misc */
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.count-note{font-size:12px;color:var(--muted);margin-left:auto}
.toggle-link{font-size:12px;color:var(--accent);cursor:pointer;text-decoration:underline;background:none;border:none;font-family:inherit}
.sub-divider{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
</style>
</head>

function getDeviceId(){

  if(!id){
    id='dev_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,8);
    try{localStorage.setItem(K.deviceId,id);}catch(e){}
  }
  return id;
}

// NEW - User Identity
function loadUser(){
  try{currentUser=JSON.parse(localStorage.getItem(K.user)||'null');}
  catch(e){currentUser=null;}
  if(!currentUser||typeof currentUser!=='object'){
    currentUser={userId:'user_'+Date.now().toString(36)+'_'+Math.random().toString(36).slice(2,7),userName:'Ranch User'};
    saveUser();
  }
  currentUser.userName=currentUser.userName||'Ranch User';
  return currentUser;
}

function saveUser(){
  try{localStorage.setItem(K.user,JSON.stringify(currentUser));}
  catch(e){alert('Storage limit reached - export and clear old data.');}
}

function userName(){ return currentUser?.userName||'Ranch User'; }

function ensureMeta(touch){
  if(!D.meta||typeof D.meta!=='object') D.meta={};
  D.meta.version=1;
  D.meta.deviceId=D.meta.deviceId||getDeviceId();
  D.meta.lastModifiedBy=D.meta.lastModifiedBy||userName();
  D.meta.lastModified=touch?Date.now():(D.meta.lastModified||Date.now());
  if(touch) D.meta.lastModifiedBy=userName();
}

function updateLastSaved(){
  const el=document.getElementById('hdr-save');
  if(el) el.textContent=`Last saved: ${D.meta?.lastModified?new Date(D.meta.lastModified).toLocaleString():'not yet'} | Device ${shortDeviceId()}`;
}

function shortDeviceId(){ return String(D.meta?.deviceId||getDeviceId()).slice(-6); }

function safeSet(key,value){
  try{localStorage.setItem(key,value);return true;}
  catch(e){
    alert('Storage limit reached - export and clear old data.');
    return false;
  }
}

function validDataShape(obj){
  return obj&&typeof obj==='object'&&ARRAY_KEYS.every(k=>Array.isArray(obj[k]))&&obj.settings&&typeof obj.settings==='object';
}

function normalizeCattleData(){
  if(Array.isArray(D.cattle)) D.cattle.forEach(c=>{if(c.ccia==null)c.ccia='';});
}

function repairDataShape(){
  const s=seed();
  ARRAY_KEYS.forEach(k=>{if(!Array.isArray(D[k]))D[k]=[];});
  if(!D.settings||typeof D.settings!=='object') D.settings=s.settings;
  D.settings.mode=D.settings.mode||'Personal';
  normalizeCattleData();
  ensureMeta(false);
}

function loadData() {
  let dataIssue=false;
  if (!localStorage.getItem(K.cattle)) {
    D = seed(); saveAll(); return;
  }
  const s=seed();
  for (const k of DATA_KEYS) {
    const raw = localStorage.getItem(K[k]);
    try{D[k] = raw ? JSON.parse(raw) : (s[k] || (k==='settings'?{}:[]));}
    catch(e){D[k]=s[k] || (k==='settings'?{}:[]);dataIssue=true;}
  }
  if(!D.settings.mode)D.settings.mode='Personal';
  normalizeCattleData();
  ensureMeta(false);
  if(!validDataShape(D)){dataIssue=true;repairDataShape();}
  if(dataIssue) setTimeout(()=>handleDataIssue(),100);
}

function save(k,opts){
  opts=opts||{};
  if(opts.touch!==false) ensureMeta(true);
  if(!safeSet(K[k],JSON.stringify(D[k])))return;
  safeSet(K.meta,JSON.stringify(D.meta));
  updateLastSaved();
  if(opts.backup!==false) pushBackup(false);
}

function saveAll(){
  ensureMeta(true);
  DATA_KEYS.forEach(k=>safeSet(K[k],JSON.stringify(D[k])));
  updateLastSaved();
  pushBackup(true);
}

// NEW - Backup System
function getBackups(){
  try{return JSON.parse(localStorage.getItem(K.backups)||'[]');}
  catch(e){return [];}
}

function pushBackup(force){
  if(saveQuiet)return;
  const now=Date.now();
  if(!force&&now-lastBackupAt<30000)return;
  lastBackupAt=now;
  const backups=getBackups();
  backups.unshift({timestamp:now,data:JSON.stringify(D)});
  safeSet(K.backups,JSON.stringify(backups.slice(0,5)));
}

function handleDataIssue(){
  const backups=getBackups();
  if(backups.length&&confirm('Data issue detected - restore from backup?')) restoreBackup(0);
  else alert('Data issue detected. Missing or damaged sections were reset so the app can keep running.');
}

// ── UTILITIES ──────────────────────────────────────────
function genId(){ return '_'+Math.random().toString(36).substr(2,9); }
function today(){ return new Date().toISOString().split('T')[0]; }
function fmtDate(iso){
  if(!iso) return '—';
  const mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const [y,m,d]=iso.split('-').map(Number);
  return `${mn[m-1]} ${d}, ${y}`;
}
function fmtStamp(ts){ return ts?new Date(ts).toLocaleString():'Unknown'; }
function daysBetween(a,b){
  return Math.round((new Date(b+'T00:00:00')-new Date(a+'T00:00:00'))/86400000);
}
function esc(s){
  if(s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function feedName(id){ const f=D.feedInv.find(x=>x.id===id); return f?f.name:'—'; }
function feedUnit(id){ const f=D.feedInv.find(x=>x.id===id); return f?f.unit:''; }
function equipName(id){ const e=D.equip.find(x=>x.id===id); return e?e.name:'—'; }
function headCount(loc){
  return D.cattle.filter(c=>c.location===loc&&(c.status==='Active'||c.status==='For Sale')).length;
}
function calcNext(last,interval){
  if(!last||interval==='As needed') return '';
  const d=new Date(last+'T00:00:00');
  if(interval==='Monthly') d.setMonth(d.getMonth()+1);
  else if(interval==='Quarterly') d.setMonth(d.getMonth()+3);
  else if(interval==='Semi-annual') d.setMonth(d.getMonth()+6);
  else if(interval==='Annual') d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
function sortArr(arr,col,dir){
  return [...arr].sort((a,b)=>{
    let va=a[col],vb=b[col];
    if(va==null) va=''; if(vb==null) vb='';
    if(typeof va==='number'&&typeof vb==='number') return dir==='asc'?va-vb:vb-va;
    va=String(va).toLowerCase(); vb=String(vb).toLowerCase();
    return dir==='asc'?va.localeCompare(vb):vb.localeCompare(va);
  });
}
function getSort(tid){ return sortStates[tid]||{col:null,dir:'asc'}; }
function toggleSort(tid,col){
  const s=getSort(tid);
  sortStates[tid]={col,dir:s.col===col&&s.dir==='asc'?'desc':'asc'};
  render();
}
function thCls(tid,col){
  const s=getSort(tid);
  return s.col===col?(s.dir==='asc'?'sort-asc':'sort-desc'):'';
}
function hasFlagNote(notes){ return /\b(monitor|watch|issue)\b/i.test(notes||''); }
function ensureActivityLog(){ if(!Array.isArray(D.activityLog)) D.activityLog=[]; }

// NEW - Change Stamping
function stampRecord(obj){
  obj.updatedAt=Date.now();
  obj.updatedBy=userName();
  return obj;
}

function ensureRecordStamp(obj){
  if(obj&&!obj.updatedAt) obj.updatedAt=D.meta?.lastModified||Date.now();
  if(obj&&!obj.updatedBy) obj.updatedBy=D.meta?.lastModifiedBy||'Unknown';
  return obj;
}

function isRecentChange(obj){
  return obj?.updatedAt&&Date.now()-obj.updatedAt<86400000*7;
}

// NEW - Activity Log
function logActivity(type,message,entityId){
  ensureActivityLog();
  const ts=Date.now();
  D.activityLog.unshift({id:genId(),date:today(),timestamp:ts,user:userName(),type,entityId:entityId||'',message});
  D.activityLog=D.activityLog.slice(0,100);
  save('activityLog');
}
function recordCount(){
  return ARRAY_KEYS.reduce((n,k)=>n+(Array.isArray(D[k])?D[k].length:0),0);
}

// NEW - Soft Locks
function setEditLock(entityId){
  editLocks[entityId]={entityId,userId:currentUser?.userId||'',timestamp:Date.now()};
}

function lockWarning(record){
  const lock=editLocks[record?.id];
  if(lock&&record?.updatedAt&&record.updatedAt>lock.timestamp){
    return `<div class="alert alert-warn">&#9888; <span>This item may have been edited elsewhere since you opened it.</span></div>`;
  }
  if(record?.updatedBy&&record.updatedBy!==userName()&&isRecentChange(record)){
    return `<div class="alert alert-warn">&#9888; <span>This item was recently changed by ${esc(record.updatedBy)}.</span></div>`;
  }
  return '';
}

function renderAlertGroup(title,items,emptyText){

function renderToday(){
  const td=today();
  const soon=new Date(td+'T00:00:00');soon.setDate(soon.getDate()+14);
  const soonIso=soon.toISOString().split('T')[0];
  const large=Array.isArray(D.cattle)&&D.cattle.length>300||recordCount()>1200;

  const health=[];
  D.health.filter(h=>h.withdrawal&&h.withdrawal>=td).forEach(h=>{
    health.push({danger:true,html:`<strong>Withdrawal active:</strong> ${esc(h.tag)} - ${esc(h.condition)} - expires ${fmtDate(h.withdrawal)}`});
  });
  D.health.filter(h=>h.status==='Ongoing'||h.status==='Monitoring').forEach(h=>{
    health.push({danger:h.status==='Ongoing',html:`<strong>${esc(h.status)}:</strong> ${esc(h.tag)} - ${esc(h.condition)}${h.notes?`<br><span class="td-muted">${esc(h.notes)}</span>`:''}`});
  });
  D.vacc.filter(v=>!v.completed&&v.scheduled&&v.scheduled<=soonIso).forEach(v=>{
    const days=daysBetween(td,v.scheduled);
    const lbl=days<0?`${Math.abs(days)} day${Math.abs(days)===1?'':'s'} overdue`:days===0?'due today':`due in ${days} day${days===1?'':'s'}`;
    health.push({danger:days<0,icon:'&#128197;',html:`<strong>Vaccination ${lbl}:</strong> ${esc(v.vaccine)} - ${esc(v.group)} (${fmtDate(v.scheduled)})`});
  });
  D.cattle.filter(c=>hasFlagNote(c.notes)).forEach(c=>{
    health.push({html:`<strong>Flagged note:</strong> ${esc(c.tag)}${c.name?` (${esc(c.name)})`:''} - ${esc(c.notes)}`});
  });

  const feed=D.feedInv.filter(f=>Number(f.onHand)<=Number(f.threshold)).map(f=>({
    html:`<strong>Low feed:</strong> ${esc(f.name)} - ${f.onHand} ${esc(f.unit)} on hand, threshold ${f.threshold}`
  }));

  const equipment=[];
  D.equip.filter(e=>e.status==='Repair Needed'||e.status==='Out of Service').forEach(e=>{
    equipment.push({danger:true,html:`<strong>${esc(e.status)}:</strong> ${esc(e.name)}`});
  });
  D.service.filter(s=>s.nextDate&&s.nextDate<=soonIso).forEach(s=>{
    const days=daysBetween(td,s.nextDate);
    const lbl=days<0?`${Math.abs(days)} day${Math.abs(days)===1?'':'s'} overdue`:days===0?'due today':`due in ${days} day${days===1?'':'s'}`;
    equipment.push({danger:days<0,html:`<strong>Service ${lbl}:</strong> ${esc(equipName(s.equipId))} - ${esc(s.serviceType)} (${fmtDate(s.nextDate)})`});
  });

  const total=health.length+feed.length+equipment.length;
  return `<div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Today</span>
      <span class="count-note">${total} item${total===1?'':'s'} needing attention</span>
    </div>
    ${large?`<div class="alert alert-warn">&#9888; <span><strong>Large dataset:</strong> performance may degrade on mobile. Export a backup before making heavy changes.</span></div>`:''}
    <div class="today-grid">
      ${renderAlertGroup('Health',health,'No health alerts, due vaccinations, or flagged notes.')}
      ${renderAlertGroup('Feed',feed,'No feed inventory is at or below threshold.')}
      ${renderAlertGroup('Equipment',equipment,'No equipment or service alerts due in the next 14 days.')}
    </div>
  </div>`;
}

}

function saveCattle(id){
  const tag=document.getElementById('f-tag').value.trim();
  if(!tag){alert('Tag number is required.');return;}
  if(D.cattle.find(c=>c.tag===tag&&c.id!==id)){alert(`Tag ${tag} is already in use.`);return;}
  const data={tag,ccia:document.getElementById('f-ccia').value.trim(),
    name:document.getElementById('f-name').value.trim(),type:document.getElementById('f-type').value,
    breed:document.getElementById('f-breed').value,dob:document.getElementById('f-dob').value,
    location:document.getElementById('f-loc').value,status:document.getElementById('f-status').value,
    notes:document.getElementById('f-notes').value.trim()};
  stampRecord(data);
  if(id){
    const i=D.cattle.findIndex(x=>x.id===id);
    const old=D.cattle[i];
    D.cattle[i]={...D.cattle[i],...data};
    const changes=[];
    if(old.location!==data.location) changes.push(`location ${old.location||'unassigned'} to ${data.location||'unassigned'}`);
    if(old.status!==data.status) changes.push(`status ${old.status||'blank'} to ${data.status||'blank'}`);
    if(changes.length) logActivity('cattle',`${data.tag}: changed ${changes.join(', ')}`,id);
    else logActivity('cattle',`${data.tag}: updated cattle record`,id);
  }
  else {const nid=genId();D.cattle.push({id:nid,...data});logActivity('cattle',`${data.tag}: added cattle record`,nid);}
  save('cattle');closeModal();render();
}

function delCattle(id){
  const c=D.cattle.find(x=>x.id===id);if(!c)return;
  if(!confirm(`Delete ${c.tag}${c.name?' ('+c.name+')':''}? This cannot be undone.`))return;
  D.cattle=D.cattle.filter(x=>x.id!==id);save('cattle');render();
}

    return `<div class="feed-card${isLow?' low':''}">

  return `<div class="section">
    <div class="sec-hdr">

    </div>
    <div class="feed-grid">${cards||'<p class="td-muted">No feed types configured.</p>'}</div>
  </div>
  <div class="two-col">
    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Feed Log</span>
        <button class="btn btn-primary" onclick="addFeedLog()">+ Log Feed</button></div>

function saveFeedLog(id){
  const qty=parseFloat(document.getElementById('f-qty').value)||0;
  const feedId=document.getElementById('f-feedid').value;
  const data={date:document.getElementById('f-date').value,feedId,qty,
    location:document.getElementById('f-loc').value,
    notes:document.getElementById('f-notes').value.trim()};
  stampRecord(data);
  if(id){
    const old=D.feedLog.find(x=>x.id===id);
    if(old){const fi=D.feedInv.find(x=>x.id===old.feedId);if(fi){fi.onHand+=old.qty;stampRecord(fi);}}
    const ni=D.feedInv.find(x=>x.id===feedId);if(ni){ni.onHand=Math.max(0,ni.onHand-qty);stampRecord(ni);}
    const i=D.feedLog.findIndex(x=>x.id===id);D.feedLog[i]={id,...data};
  }else{
    const fi=D.feedInv.find(x=>x.id===feedId);if(fi){fi.onHand=Math.max(0,fi.onHand-qty);stampRecord(fi);}
    const nid=genId();D.feedLog.push({id:nid,...data});id=nid;
  }
  logActivity('feed',`${feedName(feedId)}: feed log ${id?'saved':'added'} (${qty} ${feedUnit(feedId)})`,id);
  save('feedLog');save('feedInv');closeModal();render();
}

function delFeedLog(id){
  const e=D.feedLog.find(x=>x.id===id);
  if(!confirm('Delete this feed log entry?'))return;
  const fi=D.feedInv.find(x=>x.id===e.feedId);if(fi){fi.onHand+=e.qty;stampRecord(fi);}
  D.feedLog=D.feedLog.filter(x=>x.id!==id);save('feedLog');save('feedInv');render();
}

function renderHealth(){
  const td=today();
  const in14=new Date(td+'T00:00:00');in14.setDate(in14.getDate()+14);
  const in14s=in14.toISOString().split('T')[0];

  let alerts='';
  D.health.filter(h=>h.withdrawal&&h.withdrawal>=td).forEach(h=>{
    alerts+=`<div class="alert alert-danger">&#9888; <span><strong>Withdrawal active:</strong> ${esc(h.tag)} — ${esc(h.condition)} — expires ${fmtDate(h.withdrawal)}</span></div>`;
  });
  D.vacc.filter(v=>!v.completed&&v.scheduled>=td&&v.scheduled<=in14s).forEach(v=>{
    const days=daysBetween(td,v.scheduled);
    const lbl=days===0?'today':days===1?'tomorrow':`in ${days} days`;
    alerts+=`<div class="alert alert-warn">&#128197; <span><strong>Vaccination due ${lbl}:</strong> ${esc(v.vaccine)} — ${esc(v.group)} (${fmtDate(v.scheduled)})</span></div>`;
  });

  const show=ui.healthHistory;
  const hlist=D.health.filter(h=>show?true:h.status!=='Resolved');
  const ss=getSort('health');
  const sorted=ss.col?sortArr(hlist,ss.col,ss.dir):hlist;
  const hrows=sorted.map(h=>{
    const bcls={'Ongoing':'b-ongoing','Monitoring':'b-monitoring','Resolved':'b-resolved'}[h.status]||'b-ongoing';
    const wd=h.withdrawal&&h.withdrawal>=td?`<span class="badge b-wd" style="margin-left:4px">WD to ${fmtDate(h.withdrawal)}</span>`:'';
    return `<tr>
      <td><strong>${esc(h.tag)}</strong></td>
      <td>${esc(h.condition)}</td>
      <td>${esc(h.treatment)}</td>
      <td>${fmtDate(h.startDate)}</td>
      <td>${h.endDate?fmtDate(h.endDate):'<span class="td-muted">Ongoing</span>'}</td>
      <td><span class="badge ${bcls}">${esc(h.status)}</span>${wd}</td>
      <td class="td-muted">${esc(h.vet)}</td>
      <td class="td-act">
        <button class="btn btn-outline btn-xs" onclick="editHealth('${h.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="delHealth('${h.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  const vlist=[...D.vacc].sort((a,b)=>{
    if(a.completed!==b.completed) return a.completed?1:-1;
    return a.scheduled.localeCompare(b.scheduled);
  });
  const vrows=vlist.map(v=>{
    const past=v.scheduled<td&&!v.completed;
    const soon=!v.completed&&v.scheduled>=td&&v.scheduled<=in14s;
    const dateCell=`${fmtDate(v.scheduled)}${past?' <span class="badge b-overdue">Overdue</span>':soon?' <span class="badge b-due-soon">Due Soon</span>':''}`;
    const doneCell=v.completed
      ?`<span style="color:var(--success)">&#10003; ${fmtDate(v.completedDate)}</span>`
      :`<button class="btn btn-outline btn-xs" onclick="markVaccDone('${v.id}')">Mark Done</button>`;
    return `<tr>
      <td>${esc(v.vaccine)}</td>
      <td>${esc(v.group)}</td>
      <td>${dateCell}</td>
      <td>${doneCell}</td>
      <td class="td-act">
        <button class="btn btn-outline btn-xs" onclick="editVacc('${v.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="delVacc('${v.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  return `${alerts?`<div class="section">${alerts}</div>`:''}
  <div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Health Records</span>
      <div class="sec-hdr-right">
        <button class="toggle-link" onclick="ui.healthHistory=!ui.healthHistory;render()">${show?'Show Active Only':'Show Full History'}</button>
        <button class="btn btn-primary" onclick="addHealth()">+ Add Record</button>
      </div>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('health','tag')" class="${thCls('health','tag')}">Tag</th>
        <th onclick="toggleSort('health','condition')" class="${thCls('health','condition')}">Condition</th>
        <th>Treatment</th>
        <th onclick="toggleSort('health','startDate')" class="${thCls('health','startDate')}">Start</th>
        <th>End</th><th>Status</th><th>Vet / Treater</th><th class="no-sort"></th>
      </tr></thead>
      <tbody>${hrows||'<tr><td colspan="8" class="empty">No records match.</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="section">
    <div class="sec-hdr">
      <span class="sec-title">Vaccination Schedule</span>
      <button class="btn btn-primary" onclick="addVacc()">+ Add Vaccination</button>
    </div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('vacc','vaccine')" class="${thCls('vacc','vaccine')}">Vaccine</th>
        <th>Target Group</th>
        <th onclick="toggleSort('vacc','scheduled')" class="${thCls('vacc','scheduled')}">Scheduled</th>
        <th>Completed</th><th class="no-sort"></th>
      </tr></thead>
      <tbody>${vrows||'<tr><td colspan="5" class="empty">No vaccinations scheduled.</td></tr>'}</tbody>
    </table></div>
  </div>`;
}

function renderEquipment(){
  const td=today();
  let alerts='';
  D.equip.filter(e=>e.status==='Repair Needed'||e.status==='Out of Service').forEach(e=>{
    alerts+=`<div class="alert alert-danger">&#9888; <span><strong>${esc(e.status)}:</strong> ${esc(e.name)}</span></div>`;
  });

  const ess=getSort('equip');
  const erows=(ess.col?sortArr([...D.equip],ess.col,ess.dir):D.equip).map(e=>{
    const bcls={'Good':'b-good','Due Soon':'b-due-soon','Repair Needed':'b-repair-needed','Out of Service':'b-out-of-service'}[e.status]||'b-good';
    return `<tr>
      <td><strong>${esc(e.name)}</strong></td>
      <td>${e.year||'<span class="td-muted">—</span>'}</td>
      <td class="td-muted">${esc(e.notes)||'—'}</td>
      <td><span class="badge ${bcls}">${esc(e.status)}</span></td>
      <td class="td-act">

        <button class="btn btn-danger btn-xs" onclick="delEquip('${e.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  const srows=[...D.service].sort((a,b)=>(a.nextDate||'9999').localeCompare(b.nextDate||'9999')).map(s=>{
    const overdue=s.nextDate&&s.nextDate<td;
    const soon=s.nextDate&&s.nextDate>=td&&daysBetween(td,s.nextDate)<=14;
    const badge=overdue?'<span class="badge b-overdue">Overdue</span>':soon?'<span class="badge b-due-soon">Due Soon</span>':'';
    return `<tr>
      <td>${esc(equipName(s.equipId))}</td>
      <td>${esc(s.serviceType)}</td>
      <td class="td-muted">${s.interval}</td>
      <td>${fmtDate(s.lastDate)}</td>
      <td>${s.nextDate?fmtDate(s.nextDate):'—'} ${badge}</td>

        <button class="btn btn-outline btn-xs" onclick="editService('${s.id}')">Edit</button>
        <button class="btn btn-danger btn-xs" onclick="delService('${s.id}')">Delete</button>
      </td>
    </tr>`;
  }).join('');

  const rss=getSort('repairs');
  const rrows=(rss.col?sortArr([...D.repairs],rss.col,rss.dir):[...D.repairs].sort((a,b)=>b.date.localeCompare(a.date))).map(r=>`<tr>
    <td>${fmtDate(r.date)}</td>
    <td>${esc(equipName(r.equipId))}</td>
    <td>${esc(r.work)}</td>
    <td>${r.cost!=null&&r.cost!==''?'$'+r.cost:'—'}</td>
    <td class="td-muted">${esc(r.by)||'—'}</td>
    <td class="td-act">
      <button class="btn btn-outline btn-xs" onclick="editRepair('${r.id}')">Edit</button>
      <button class="btn btn-danger btn-xs" onclick="delRepair('${r.id}')">Delete</button>
    </td>
  </tr>`).join('');

  return `${alerts?`<div class="section">${alerts}</div>`:''}
  <div class="section">
    <div class="sec-hdr"><span class="sec-title">Equipment</span>
      <button class="btn btn-primary" onclick="addEquip()">+ Add Equipment</button></div>
    <div class="tbl-wrap"><table>
      <thead><tr>
        <th onclick="toggleSort('equip','name')" class="${thCls('equip','name')}">Equipment</th>
        <th onclick="toggleSort('equip','year')" class="${thCls('equip','year')}">Year</th>
        <th>Notes</th>
        <th onclick="toggleSort('equip','status')" class="${thCls('equip','status')}">Status</th>
        <th class="no-sort"></th>
      </tr></thead>
      <tbody>${erows||'<tr><td colspan="5" class="empty">No equipment added.</td></tr>'}</tbody>
    </table></div>
  </div>
  <div class="two-col">
    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Service Schedule</span>
        <button class="btn btn-primary" onclick="addService()">+ Add Item</button></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th>Equipment</th><th>Service</th><th>Interval</th>
          <th>Last Done</th><th>Next Due</th><th class="no-sort"></th>
        </tr></thead>
        <tbody>${srows||'<tr><td colspan="6" class="empty">No service items.</td></tr>'}</tbody>
      </table></div>
    </div>
    <div class="section">
      <div class="sec-hdr"><span class="sec-title">Repair Log</span>
        <button class="btn btn-primary" onclick="addRepair()">+ Log Repair</button></div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th onclick="toggleSort('repairs','date')" class="${thCls('repairs','date')}">Date</th>
          <th>Equipment</th><th>Work Done</th><th>Cost</th><th>By</th><th class="no-sort"></th>
        </tr></thead>

      </table></div>
    </div>
  </div>`;
}

function saveLoc(id){
  const name=document.getElementById('f-name').value.trim();
  if(!name){alert('Location name is required.');return;}
  const data={name,type:document.getElementById('f-type').value,
    size:document.getElementById('f-size').value.trim(),
    notes:document.getElementById('f-notes').value.trim()};
  stampRecord(data);
  if(id){
    const i=D.locs.findIndex(x=>x.id===id);
    const oldName=D.locs[i].name;
    D.locs[i]={...D.locs[i],...data};
    if(oldName!==name){
      D.cattle.forEach(c=>{if(c.location===oldName){c.location=name;stampRecord(c);}});
      save('cattle');
    }
  }else {const nid=genId();D.locs.push({id:nid,...data});id=nid;}
  logActivity('locations',`${name}: location saved`,id);
  save('locs');closeModal();render();

  const l=D.locs.find(x=>x.id===id);
  if(!confirm(`Delete "${l.name}"? Animals assigned here will not be automatically reassigned.`))return;
  D.locs=D.locs.filter(x=>x.id!==id);save('locs');render();
}

function logMove(prefill){
  const locOpts=D.locs.map(l=>`<option value="${esc(l.name)}">${esc(l.name)}</option>`).join('');
  setModal('Log a Move',`<div class="fg c1">
    <div class="frow"><label class="flabel">Date</label>
      <input class="finput" id="f-date" type="date" value="${today()}"></div>
    <div class="frow"><label class="flabel">Animal Tag(s) *</label>
      <input class="finput" id="f-animals" type="text" value="${esc(prefill||'')}" placeholder="e.g. M-001 or M-001, M-002, M-003">
      <span class="fhint">Comma-separated for multiple animals. Location in the Cattle roster will be updated automatically.</span></div>
    <div class="frow"><label class="flabel">From Location</label>
      <select class="fselect" id="f-from"><option value="">— Select —</option>${locOpts}</select></div>
    <div class="frow"><label class="flabel">To Location *</label>
      <select class="fselect" id="f-to"><option value="">— Select —</option>${locOpts}</select></div>
    <div class="frow"><label class="flabel">Reason (optional)</label>
      <input class="finput" id="f-reason" type="text" placeholder="e.g. Breeding season start"></div>
  </div>
  <div class="modal-foot">
    <button class="btn btn-outline" onclick="closeModal()">Cancel</button>
    <button class="btn btn-primary" onclick="saveMove()">Log Move</button>
  </div>`);
}

function saveMove(){
  const animals=document.getElementById('f-animals').value.trim();
  const to=document.getElementById('f-to').value;
  if(!animals){alert('Animal tag(s) are required.');return;}
  if(!to){alert('Destination location is required.');return;}
  const tags=animals.split(',').map(t=>t.trim()).filter(Boolean);
  let found=0;
  tags.forEach(tag=>{
    const c=D.cattle.find(x=>x.tag.toLowerCase()===tag.toLowerCase());
    if(c){c.location=to;stampRecord(c);found++;}
  });
  if(found>0) save('cattle');
  const move={id:genId(),date:document.getElementById('f-date').value,animals,
    from:document.getElementById('f-from').value,to,
    reason:document.getElementById('f-reason').value.trim()};
  stampRecord(move);
  D.moves.push(move);
  logActivity('move',`${animals}: moved to ${to}${document.getElementById('f-from').value?` from ${document.getElementById('f-from').value}`:''}`,move.id);
  selectedCattle={};
  save('moves');closeModal();render();
  if(found<tags.length){
    setTimeout(()=>alert(`Move logged. Note: ${tags.length-found} tag(s) not found in the cattle roster and were not updated automatically.`),100);
  }
}

function delMove(id){
  if(!confirm('Delete this move entry?'))return;
  D.moves=D.moves.filter(x=>x.id!==id);save('moves');render();
}

// NEW - Data Backup
function exportData(filename){
  ensureMeta(false);
  ensureActivityLog();
  D.meta.exportedBy=userName();
  D.meta.user={userId:currentUser?.userId||'',userName:userName()};
  save('meta',{touch:false,backup:false});
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=filename||`mcmahon-ranch-backup-${today()}.json`;
  document.body.appendChild(a);
  a.click();
  URL.revokeObjectURL(a.href);
  a.remove();
}
function quickExport(){ exportData(`ranch-data-${today()}.json`); }
function validImport(obj){
  if(!obj||typeof obj!=='object'||Array.isArray(obj)) return false;
  return validDataShape({...obj,activityLog:Array.isArray(obj.activityLog)?obj.activityLog:[]});
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=function(){
    previewImportText(r.result);
  };
  r.readAsText(file);
}
function importPastedData(){
  const raw=document.getElementById('f-paste-data')?.value.trim();
  if(!raw){alert('Paste ranch JSON first.');return;}
  previewImportText(raw);
}
function previewImportText(raw){
  try{
    const obj=JSON.parse(raw);
    if(!validImport(obj)){alert('Import failed. JSON is valid, but it is not a McMahon Ranch backup.');return;}
    obj.activityLog=Array.isArray(obj.activityLog)?obj.activityLog:[];
    obj.meta=obj.meta&&typeof obj.meta==='object'?obj.meta:{version:1,lastModified:0,deviceId:'unknown'};
    pendingImport=obj;
    showImportPreview(obj);
  }catch(e){alert('Import failed. The selected data is not valid JSON.');}
}

// NEW - Conflict Detection
function showImportPreview(obj){
  const incoming=obj.meta?.lastModified||0;
  const current=D.meta?.lastModified||0;
  const diff=incoming-current;
  const lastImport=D.meta?.lastImportedAt||0;
  const changesSince=(obj.activityLog||[]).filter(a=>(a.timestamp||0)>lastImport).length;
  const lastBy=obj.meta?.lastModifiedBy||obj.meta?.exportedBy||obj.meta?.user?.userName||'Unknown';
  const warn=diff<0
    ?'<div class="alert alert-warn">&#9888; <span><strong>Imported data is older than current data.</strong> Continue only if that is intentional.</span></div>'
    :Math.abs(diff)<300000
      ?'<div class="alert alert-warn">&#9888; <span><strong>Timestamps are close.</strong> Merge can reduce accidental loss when both devices were edited recently.</span></div>'
      :'<div class="alert alert-warn">&#128190; <span>Imported data is newer than current data or has no conflict warning.</span></div>';
  setModal('Import Preview',`
    ${warn}
    <div class="alert alert-warn">&#9888; <span>Always export before importing from another device.</span></div>
    <p class="fhint" style="margin-bottom:10px">This file was last edited by ${esc(lastBy)} on ${fmtStamp(incoming)}.</p>
    <div class="slist">
      <div class="slist-item"><span>Cattle</span><strong>${obj.cattle.length}</strong></div>
      <div class="slist-item"><span>Total records</span><strong>${ARRAY_KEYS.reduce((n,k)=>n+(Array.isArray(obj[k])?obj[k].length:0),0)}</strong></div>
      <div class="slist-item"><span>Changes since last import</span><strong>${changesSince}</strong></div>
      <div class="slist-item"><span>Incoming last modified</span><strong>${fmtStamp(incoming)}</strong></div>
      <div class="slist-item"><span>Current last modified</span><strong>${fmtStamp(current)}</strong></div>
      <div class="slist-item"><span>Time difference</span><strong>${Math.round(Math.abs(diff)/60000)} min</strong></div>
      <div class="slist-item"><span>Incoming device</span><strong>${esc(String(obj.meta?.deviceId||'unknown').slice(-6))}</strong></div>
    </div>
    <p class="fhint" style="margin-top:10px">Replace overwrites this browser. Merge adds missing records and prefers imported records when the same id exists.</p>
    <div class="modal-foot">
      <button class="btn btn-outline" onclick="pendingImport=null;openSettings()">Cancel</button>
      <button class="btn btn-outline" onclick="applyImport('merge')">Merge</button>
      <button class="btn btn-primary" onclick="applyImport('replace')">Replace</button>
    </div>`);
}

function applyImport(mode){
  if(!pendingImport)return;
  const incoming=pendingImport;
  const current=D.meta?.lastModified||0;
  if(mode==='replace'&&incoming.meta?.lastModified&&incoming.meta.lastModified<current&&!confirm('Imported data is older than current data. Continue?'))return;
  if(!confirm(mode==='merge'?'Merge imported data into current data?':'Replace current data with imported data?'))return;
  pushBackup(true);
  if(mode==='merge') D=mergeData(D,incoming);
  else D={...incoming,activityLog:Array.isArray(incoming.activityLog)?incoming.activityLog:[]};
  normalizeCattleData();
  ensureMeta(true);
  D.meta.deviceId=getDeviceId();
  D.meta.lastImportedAt=Date.now();
  D.meta.lastImportedBy=incoming.meta?.lastModifiedBy||incoming.meta?.exportedBy||'Unknown';
  pendingImport=null;
  logActivity('settings',mode==='merge'?'Merged imported ranch data':'Imported ranch data backup');
  saveAll();
  closeModal();
  document.getElementById('hdr-name').textContent=(D.settings?.ranchName||'McMahon Ranch').toUpperCase();
  render();
}

// NEW - Safe Merge
function mergeById(currentArr,incomingArr,preferImported){
  const out=[...(Array.isArray(currentArr)?currentArr:[])];
  const index={};
  out.forEach((x,i)=>{if(x&&x.id)index[x.id]=i;});
  (Array.isArray(incomingArr)?incomingArr:[]).forEach(item=>{
    if(!item||!item.id){out.push(item);return;}
    if(index[item.id]==null){index[item.id]=out.length;out.push(item);return;}
    const cur=out[index[item.id]];
    const curTs=cur.updatedAt||0;
    const incTs=item.updatedAt||0;
    if(curTs&&incTs&&curTs!==incTs){
      const keepIncoming=incTs>=curTs;
      mergeConflicts.push({id:item.id,kept:keepIncoming?item:cur,dropped:keepIncoming?cur:item});
      if(keepIncoming) out[index[item.id]]=item;
    }else if(preferImported||incTs>curTs) out[index[item.id]]=item;
  });
  return out;
}
function mergeData(current,incoming){
  const merged={...current};
  mergeConflicts=[];
  ARRAY_KEYS.forEach(k=>{merged[k]=mergeById(current[k],incoming[k],true);});
  merged.settings={...incoming.settings,...current.settings};
  merged.meta={version:1,lastModified:Date.now(),deviceId:getDeviceId()};
  merged.activityLog=Array.isArray(merged.activityLog)?merged.activityLog:[];
  mergeConflicts.slice(0,20).forEach(c=>{
    merged.activityLog.unshift({id:genId(),date:today(),timestamp:Date.now(),user:userName(),type:'conflict',entityId:c.id,message:`Conflict: ${c.id} updated by two sources - latest kept`});
  });
  return merged;
}

function copyData(){
  ensureMeta(false);
  const text=JSON.stringify(D,null,2);
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(()=>alert('Ranch data copied to clipboard.')).catch(()=>copyFallback(text));
  }else copyFallback(text);
}
function copyFallback(text){
  const t=document.createElement('textarea');
  t.value=text;document.body.appendChild(t);t.select();
  try{document.execCommand('copy');alert('Ranch data copied to clipboard.');}
  catch(e){alert('Clipboard copy failed. Use Export Data instead.');}
  t.remove();
}

// NEW - Shared Sync
function sharedUrl(){
  return (D.settings.sharedUrl||'').trim();
}

function syncFromSharedSource(){
  const url=sharedUrl();
  if(!url){alert('Add a Shared Data URL first.');return;}
  fetch(url,{cache:'no-store'})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);return r.text();})
    .then(txt=>previewImportText(txt))
    .catch(()=>alert('Sync failed. Check the Shared Data URL or use file import instead.'));
}

function pushToSharedSource(){
  const url=sharedUrl();
  if(!url){alert('Add a Shared Data URL first.');return;}
  if(!confirm('Push current ranch data to the shared source? Export a backup first if you are unsure.'))return;
  D.meta.exportedBy=userName();
  fetch(url,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(D)})
    .then(r=>{if(!r.ok)throw new Error('HTTP '+r.status);alert('Shared source updated.');})
    .catch(()=>alert('Push failed. This endpoint may not accept POST, or the browser may be offline.'));
}

function restoreBackup(i){
  const b=getBackups()[i];
  if(!b){alert('Backup not found.');return;}
  if(!confirm('Restore this backup? Current ranch data in this browser will be replaced.'))return;
  try{
    const obj=JSON.parse(b.data);
    if(!validImport(obj)){alert('Restore failed. Backup data is not valid.');return;}
    D={...obj,activityLog:Array.isArray(obj.activityLog)?obj.activityLog:[]};
    normalizeCattleData();
    ensureMeta(true);
    D.meta.deviceId=getDeviceId();
    logActivity('settings',`Restored backup from ${fmtStamp(b.timestamp)}`);
    saveAll();
    closeModal();
    document.getElementById('hdr-name').textContent=(D.settings?.ranchName||'McMahon Ranch').toUpperCase();
    render();
  }catch(e){alert('Restore failed. Backup data could not be read.');}
}
function resetSampleData(){
  if(!confirm('Reset to sample data? Current ranch data in this browser will be replaced.'))return;
  D=seed();
  logActivity('settings','Reset to sample data');
  saveAll();
  closeModal();
  document.getElementById('hdr-name').textContent=(D.settings?.ranchName||'McMahon Ranch').toUpperCase();
  render();
}
