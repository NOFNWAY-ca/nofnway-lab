<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOFNWAY Lab — Shared Alarm</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue:   #4d9eff;
            --bg:     #0a0a0a;
            --card:   #141414;
            --border: #2a2a2a;
            --text:   #e0e0e0;
            --dim:    #666;
            --red:    #ff6b6b;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
        }

        .wrap { width: 100%; max-width: 360px; text-align: center; }

        .eyebrow {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--blue);
            margin-bottom: 6px;
        }

        h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 12px; }

        .tagline {
            font-size: 0.9rem;
            color: var(--dim);
            line-height: 1.6;
            margin-bottom: 36px;
        }

        /* ── Big time display ── */
        .time-display {
            font-size: 5.5rem;
            font-weight: 700;
            letter-spacing: -3px;
            line-height: 1;
            font-variant-numeric: tabular-nums;
            margin: 16px 0 6px;
        }
        .time-display.unset { color: var(--dim); }

        .label-line   { font-size: 0.88rem; color: var(--dim); min-height: 1.2em; margin-bottom: 4px; }
        .updated-line { font-size: 0.75rem; color: var(--border); min-height: 1em; margin-bottom: 28px; }

        /* ── Buttons ── */
        .btn {
            display: inline-block;
            padding: 12px 22px;
            border-radius: 8px;
            border: none;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: opacity 0.15s, transform 0.1s;
            white-space: nowrap;
        }
        .btn:hover  { opacity: 0.82; }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--blue); color: #000; }
        .btn-ghost { background: transparent; color: var(--dim); border: 1px solid var(--border); }
        .btn-ghost:hover { color: var(--text); border-color: #444; }

        .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

        /* ── Tap picker ── */
        .time-picker {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin: 20px 0 24px;
        }

        .picker-col {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .picker-arrow {
            background: transparent;
            border: none;
            color: var(--dim);
            font-size: 1.4rem;
            cursor: pointer;
            padding: 10px 24px;
            border-radius: 8px;
            line-height: 1;
            transition: background 0.1s, color 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .picker-arrow:hover  { background: var(--card); color: var(--text); }
        .picker-arrow:active { background: var(--border); }

        .picker-val {
            font-size: 4rem;
            font-weight: 700;
            color: var(--text);
            font-variant-numeric: tabular-nums;
            min-width: 2ch;
            text-align: center;
            line-height: 1.1;
            user-select: none;
        }

        .picker-sep {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--dim);
            padding-bottom: 6px;
            user-select: none;
        }

        .ampm-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-left: 6px;
            padding-bottom: 4px;
        }

        .ampm-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--dim);
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 10px 14px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.1s, color 0.1s, border-color 0.1s;
            -webkit-tap-highlight-color: transparent;
        }
        .ampm-btn.active { background: var(--blue); color: #000; border-color: var(--blue); }

        /* ── Label input ── */
        .label-wrap { margin-bottom: 6px; text-align: left; }

        .form-label {
            display: block;
            font-size: 0.68rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--dim);
            margin-bottom: 6px;
        }
        .form-label .hint { font-weight: 400; text-transform: none; letter-spacing: 0; font-size: 0.75rem; }

        input[type="text"] {
            width: 100%;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            padding: 12px 14px;
            outline: none;
            font-family: inherit;
            transition: border-color 0.15s;
        }
        input[type="text"]:focus { border-color: var(--blue); }

        .msg-error { font-size: 0.83rem; color: var(--red); margin: 10px 0 14px; min-height: 1.2em; }
        .msg-loading { font-size: 0.88rem; color: var(--dim); }

        [hidden] { display: none !important; }
    </style>
</head>
<body>
<div class="wrap">

    <!-- ── Landing ── -->
    <div id="view-landing" hidden>
        <div class="eyebrow">NOFNWAY Lab</div>
        <h1>Shared Alarm</h1>
        <p class="tagline">See what time someone's alarm is set for — without waking them up.</p>
        <button class="btn btn-primary" onclick="createAlarm()">Create alarm link</button>
    </div>

    <!-- ── Loading ── -->
    <div id="view-loading" hidden>
        <p class="msg-loading">Loading…</p>
    </div>

    <!-- ── Alarm view ── -->
    <div id="view-alarm" hidden>
        <div class="eyebrow">NOFNWAY Lab — Alarm</div>

        <!-- Display -->
        <div id="state-display">
            <div class="time-display" id="time-text">—</div>
            <div class="label-line"   id="label-text"></div>
            <div class="updated-line" id="updated-text"></div>
            <div class="btn-row">
                <button class="btn btn-ghost" onclick="showEdit()">Edit</button>
                <button class="btn btn-ghost" id="share-btn" onclick="shareLink()">Share link</button>
            </div>
        </div>

        <!-- Edit -->
        <div id="state-edit" hidden>

            <div class="time-picker">
                <div class="picker-col">
                    <button class="picker-arrow" onclick="adjustHour(1)"  aria-label="Hour up">▲</button>
                    <div class="picker-val" id="pick-hour">7</div>
                    <button class="picker-arrow" onclick="adjustHour(-1)" aria-label="Hour down">▼</button>
                </div>

                <div class="picker-sep">:</div>

                <div class="picker-col">
                    <button class="picker-arrow" onclick="adjustMin(1)"  aria-label="Minute up">▲</button>
                    <div class="picker-val" id="pick-min">00</div>
                    <button class="picker-arrow" onclick="adjustMin(-1)" aria-label="Minute down">▼</button>
                </div>

                <div class="ampm-col">
                    <button id="btn-am" class="ampm-btn" onclick="setAmPm('AM')">AM</button>
                    <button id="btn-pm" class="ampm-btn" onclick="setAmPm('PM')">PM</button>
                </div>
            </div>

            <div class="label-wrap">
                <label class="form-label" for="input-label">
                    Label <span class="hint">(optional — e.g. "Gerry's alarm")</span>
                </label>
                <input type="text" id="input-label" maxlength="64" placeholder="Whose alarm is this?">
            </div>

            <div class="msg-error" id="save-error"></div>

            <div class="btn-row" style="margin-top:20px;">
                <button class="btn btn-primary" onclick="saveAlarm()">Save</button>
                <button class="btn btn-ghost"   onclick="cancelEdit()">Cancel</button>
            </div>
        </div>
    </div>

</div>
<script>
    const code = new URLSearchParams(window.location.search).get('code');

    let currentData  = null;
    let refreshTimer = null;
    let clockTimer   = null;

    // Picker state
    let pickHour  = 7;
    let pickMin   = 0;
    let pickAmPm  = 'AM';

    const $ = id => document.getElementById(id);
    const show = id => $(id).hidden = false;
    const hide = id => $(id).hidden = true;

    // ── Picker logic ─────────────────────────────────────────
    function updatePickerDisplay() {
        $('pick-hour').textContent = pickHour;
        $('pick-min').textContent  = String(pickMin).padStart(2, '0');
        $('btn-am').className = 'ampm-btn' + (pickAmPm === 'AM' ? ' active' : '');
        $('btn-pm').className = 'ampm-btn' + (pickAmPm === 'PM' ? ' active' : '');
    }

    function adjustHour(dir) {
        pickHour = ((pickHour - 1 + dir + 12) % 12) + 1;
        updatePickerDisplay();
    }

    function adjustMin(dir) {
        pickMin = (pickMin + dir * 5 + 60) % 60;
        updatePickerDisplay();
    }

    function setAmPm(val) {
        pickAmPm = val;
        updatePickerDisplay();
    }

    function timeToPickerState(time) {
        const [h, m] = time.split(':').map(Number);
        if      (h === 0)  { pickHour = 12; pickAmPm = 'AM'; }
        else if (h < 12)   { pickHour = h;  pickAmPm = 'AM'; }
        else if (h === 12) { pickHour = 12; pickAmPm = 'PM'; }
        else               { pickHour = h - 12; pickAmPm = 'PM'; }
        pickMin = Math.round(m / 5) * 5 % 60;
    }

    function pickerStateToTime() {
        let h = pickHour;
        if (pickAmPm === 'AM' && h === 12) h = 0;
        else if (pickAmPm === 'PM' && h !== 12) h += 12;
        return `${String(h).padStart(2, '0')}:${String(pickMin).padStart(2, '0')}`;
    }

    // ── Time ago ─────────────────────────────────────────────
    function timeAgo(ms) {
        const diff = Date.now() - ms;
        const mins = Math.floor(diff / 60000);
        if (mins < 1)   return 'just now';
        if (mins === 1) return '1 minute ago';
        if (mins < 60)  return `${mins} minutes ago`;
        const hrs = Math.floor(mins / 60);
        if (hrs === 1)  return '1 hour ago';
        if (hrs < 24)   return `${hrs} hours ago`;
        return `${Math.floor(hrs / 24)} days ago`;
    }

    // ── Code generator ───────────────────────────────────────
    function generateCode() {
        const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
        let c = '';
        for (let i = 0; i < 6; i++) c += chars[Math.floor(Math.random() * chars.length)];
        return c;
    }

    function createAlarm() {
        window.location.href = `/alarm?code=${generateCode()}`;
    }

    // ── API ──────────────────────────────────────────────────
    async function fetchAlarm() {
        try {
            const res = await fetch(`/api/alarm/${code}`);
            if (res.status === 404) return null;
            if (!res.ok) throw new Error();
            return await res.json();
        } catch { return null; }
    }

    async function postAlarm(time, label) {
        const res = await fetch(`/api/alarm/${code}`, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({ time, label }),
        });
        if (!res.ok) throw new Error('save failed');
    }

    // ── Render display ───────────────────────────────────────
    function renderDisplay(data) {
        hide('state-edit');
        show('state-display');
        const timeEl    = $('time-text');
        const labelEl   = $('label-text');
        const updatedEl = $('updated-text');

        if (!data) {
            timeEl.textContent    = '—';
            timeEl.className      = 'time-display unset';
            labelEl.textContent   = 'No alarm set yet.';
            updatedEl.textContent = '';
        } else {
            // Convert stored 24h time to 12h for display
            const [h, m] = data.time.split(':').map(Number);
            const ampm   = h < 12 ? 'AM' : 'PM';
            const hour12 = h % 12 || 12;
            const display = `${hour12}:${String(m).padStart(2,'0')} ${ampm}`;
            timeEl.textContent    = display;
            timeEl.className      = 'time-display';
            labelEl.textContent   = data.label || '';
            updatedEl.textContent = data.updated ? 'Updated ' + timeAgo(data.updated) : '';
        }
    }

    function startClock() {
        clearInterval(clockTimer);
        clockTimer = setInterval(() => {
            if (currentData?.updated && $('state-edit').hidden) {
                $('updated-text').textContent = 'Updated ' + timeAgo(currentData.updated);
            }
        }, 30000);
    }

    // ── Edit ─────────────────────────────────────────────────
    function showEdit() {
        hide('state-display');
        show('state-edit');
        if (currentData?.time) {
            timeToPickerState(currentData.time);
        } else {
            pickHour = 7; pickMin = 0; pickAmPm = 'AM';
        }
        updatePickerDisplay();
        $('input-label').value      = currentData?.label || '';
        $('save-error').textContent = '';
    }

    function cancelEdit() { renderDisplay(currentData); }

    async function saveAlarm() {
        const time  = pickerStateToTime();
        const label = $('input-label').value.trim();
        const errEl = $('save-error');
        errEl.textContent = '';
        try {
            await postAlarm(time, label);
            currentData = { time, label, updated: Date.now() };
            renderDisplay(currentData);
        } catch {
            errEl.textContent = 'Something went wrong. Try again.';
        }
    }

    // ── Share ────────────────────────────────────────────────
    function shareLink() {
        const url  = window.location.href;
        const btn  = $('share-btn');
        const orig = btn.textContent;
        if (navigator.share) { navigator.share({ title: 'My alarm link', url }).catch(() => {}); return; }
        navigator.clipboard.writeText(url).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => { btn.textContent = orig; }, 2000);
        }).catch(() => {
            btn.textContent = 'Copy failed';
            setTimeout(() => { btn.textContent = orig; }, 2000);
        });
    }

    // ── Auto-refresh ─────────────────────────────────────────
    function startRefresh() {
        clearInterval(refreshTimer);
        refreshTimer = setInterval(async () => {
            if (!$('state-edit').hidden) return;
            currentData = await fetchAlarm();
            renderDisplay(currentData);
        }, 60000);
    }

    // ── Keyboard ─────────────────────────────────────────────
    document.addEventListener('keydown', e => {
        if (!$('state-edit').hidden) {
            if (e.key === 'Enter')  saveAlarm();
            if (e.key === 'Escape') cancelEdit();
        }
    });

    // ── Init ─────────────────────────────────────────────────
    (async function init() {
        if (!code) { show('view-landing'); return; }
        show('view-loading');
        currentData = await fetchAlarm();
        hide('view-loading');
        show('view-alarm');
        renderDisplay(currentData);
        startRefresh();
        startClock();
    })();
</script>
</body>
</html>
